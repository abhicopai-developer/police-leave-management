<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UP Police Leave Management - Dashboard</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f4f6f9;
}

.header{
    background:#0b3d91;
    color:white;
    padding:15px;
    text-align:center;
}

.header h2{
    margin-bottom:5px;
}

.container{
    width:95%;
    margin:auto;
    margin-top:20px;
}

.cards{
    display:flex;
    flex-wrap:wrap;
    gap:20px;
}

.card{
    flex:1;
    min-width:220px;
    background:white;
    border-radius:10px;
    padding:20px;
    box-shadow:0 0 8px rgba(0,0,0,.2);
    text-align:center;
}

.card h3{
    color:#0b3d91;
}

.card p{
    font-size:28px;
    font-weight:bold;
    margin-top:10px;
}

.menu{
    margin-top:30px;
}

.menu a{
    display:inline-block;
    margin:10px;
    padding:12px 20px;
    background:#0b3d91;
    color:white;
    text-decoration:none;
    border-radius:6px;
}

.menu a:hover{
    background:#062d6f;
}

.table-box{
    margin-top:30px;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 8px rgba(0,0,0,.2);
}

table{
    width:100%;
    border-collapse:collapse;
}

table th,table td{
    border:1px solid #ddd;
    padding:10px;
    text-align:center;
}

table th{
    background:#0b3d91;
    color:white;
}

.footer{
    margin-top:30px;
    background:#0b3d91;
    color:white;
    text-align:center;
    padding:15px;
}
</style>

</head>

<body>

<div class="header">
<h2>UP Police Leave Management System</h2>
<p>Special Enquiry Unit Dashboard</p>
</div>

<div class="container">
